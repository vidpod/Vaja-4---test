name: 29917_test

on:
  push:
    branches:
      - main

jobs:

  # =====================================================
  # JOB 1: preveri obstoj testov + zabeleži napake
  # =====================================================
  check_tests:
    runs-on: self-hosted

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Preveri test datoteko
        run: |
          rm -f napaka.txt
          touch napaka.txt

          if [ ! -f "main_test.py" ]; then
            echo "NAPAKA: main_test.py ne obstaja" >> napaka.txt
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  # =====================================================
  # JOB 2: izvajanje testov (odvisno od prvega joba)
  # =====================================================
  run_tests:
    runs-on: self-hosted
    needs: check_tests

    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Preveri napake iz prvega joba
        run: |
          if grep -q "NAPAKA" napaka.txt; then
            echo "Napake iz check joba:"
            cat napaka.txt
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Namesti pytest
        run: pip install pytest

      - name: Zaženi teste (Python ${{ matrix.python-version }})
        run: pytest -v