name: 29917_deploy

on:
  workflow_run:
    workflows: ["29917_test"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Prenesi artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Preveri napake
        run: |
          if [ -s napaka.txt ]; then
            echo "Testi niso uspešni, deploy se ustavi"
            exit 1
          fi

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/calculator:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/calculator:latest